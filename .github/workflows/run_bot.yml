name: Lunch Reminder Bot

on:
  schedule:
    # Runs Sunday-Thursday before the reminder window in Europe/Kyiv.
    # 12:30 UTC is 14:30 in winter and 15:30 in summer, so the bot is alive at 17:00 and 17:30.
    - cron: '30 12 * * 0-4'
  workflow_dispatch:

concurrency:
  group: lunch-reminder-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        MONGO_URI: ${{ secrets.MONGO_URI }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: python main.py
